<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
    <!-- jQuery is no longer needed for resizing, so it has been removed -->
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script> 
    <style>
      :root {
        --surface-color: #f8f9fa; --primary-text-color: #202124;
        --secondary-text-color: #5f6368; --primary-color: #1a73e8; --border-color: #dadce0;
      }
      html, body {
        margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
      }
      body {
        font-family: 'Roboto', sans-serif; background-color: var(--surface-color);
        display: flex; flex-direction: column; box-sizing: border-box;
      }
      .content-wrapper {
        padding: 16px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box;
      }
      .toolbar { margin-bottom: 12px; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
      .toolbar button { background-color: transparent; border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-weight: 500; transition: background-color 0.2s; }
      .toolbar button:hover { background-color: #f1f3f4; }
      .color-picker { border: none; background: none; width: 24px; height: 24px; padding: 0; cursor: pointer; }
      
      #editor { position: relative; width: 100%; flex-grow: 1; border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; box-sizing: border-box; overflow-y: auto; background-color: white; }
      #editor:focus { outline-color: var(--primary-color); }
      #editor img { cursor: pointer; max-width: 100%; height: auto; border-radius: 8px; background-color: #f1f3f4; }

      /* --- DEFINITIVE IMAGE RESIZING --- */
      .resizable-image-container { position: relative; display: inline-block; line-height: 0; }
      .resizable-image-container img { border: 3px dashed var(--primary-color); }
      #image-resize-handle {
        position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px;
        background-color: var(--primary-color); border: 2px solid white; border-radius: 50%;
        cursor: se-resize; display: none;
      }
      
      .footer { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
      #status { font-style: italic; color: var(--secondary-text-color); font-size: 0.9em; }
      .close-button { background-color: var(--primary-color); color: white; border: none; border-radius: 18px; padding: 8px 24px; font-weight: 500; cursor: pointer; }
      .close-button:disabled { background-color: #9e9e9e; cursor: not-allowed; }

      /* Loading Spinner */
      #loader-wrapper { display: flex; justify-content: center; align-items: center; height: 100%; }
      .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div id="loader-wrapper"><div class="loader"></div></div>
        <div id="main-content" style="display:none; flex-direction: column; height: 100%;">
            <div class="toolbar">
                <button onclick="formatDoc('bold')"><b>B</b></button>
                <button onclick="formatDoc('italic')"><i>I</i></button>
                <input type="color" onchange="formatDoc('forecolor', this.value)" class="color-picker" title="Text Color">
                <button onclick="document.getElementById('imageFile').click()">Upload Image</button>
                <input type="file" id="imageFile" accept="image/*" style="display: none;" onchange="handleFileSelect(this.files)">
            </div>
            <div id="editor" contenteditable="true"></div>
            <div class="footer">
                <div id="status">Changes are saved automatically.</div>
                <button class="close-button" id="closeBtn" onclick="closeDialog()">Close</button>
            </div>
        </div>
    </div>
    <div id="image-resize-handle"></div>

    <script>
      var a1Notation = '<?= a1Notation ?>';
      var uniqueKey = '<?= uniqueKey ?>';
      var editor, statusDiv, saveTimeout;
      var isDirty = false;
      var activeImage = null; // To track the image being resized
      
      window.onload = function() {
        editor = document.getElementById('editor');
        statusDiv = document.getElementById('status');
        google.script.run.withSuccessHandler(note => {
          editor.innerHTML = note;
          document.getElementById('loader-wrapper').style.display = 'none';
          document.getElementById('main-content').style.display = 'flex';
          loadImages();
        }).getNote(uniqueKey);
        
        editor.addEventListener('input', () => handleTyping());
        editor.addEventListener('click', (e) => handleEditorClick(e));
        editor.addEventListener('paste', (e) => handlePaste(e)); // <-- ADD THIS LINE
        setupImageResizer();
      };

      // --- All other functions (loadImages, handleTyping, autosave, handleFileSelect, closeDialog, formatDoc) remain the same ---
      function loadImages() { /* ... same as before ... */ }
      function handleTyping() { /* ... same as before ... */ }
      function autosave() { /* ... same as before ... */ }
      function handleFileSelect(files) { /* ... same as before ... */ }
      function closeDialog() { /* ... same as before ... */ }
      function formatDoc(command, value) { /* ... same as before ... */ }
      
      // --- DEFINITIVE IMAGE RESIZING LOGIC ---
      function handleEditorClick(e) {
        if (e.target.tagName === 'IMG') {
          setActiveImage(e.target);
        } else if (activeImage) {
          setActiveImage(null);
        }
      }
      function setActiveImage(img) {
        const handle = document.getElementById('image-resize-handle');
        if (activeImage) {
          activeImage.style.border = ''; // Remove border from old image
        }
        activeImage = img;
        if (img) {
          img.style.border = '3px dashed var(--primary-color)';
          const rect = img.getBoundingClientRect();
          const editorRect = editor.getBoundingClientRect();
          handle.style.display = 'block';
          handle.style.left = (rect.right - editorRect.left - 10) + 'px';
          handle.style.top = (rect.bottom - editorRect.top - 10) + 'px';
        } else {
          handle.style.display = 'none';
        }
      }
      function setupImageResizer() {
        const handle = document.getElementById('image-resize-handle');
        let startX, startY, startWidth, startHeight;

        handle.addEventListener('mousedown', function(e) {
            e.preventDefault();
            startX = e.clientX;
            startY = e.clientY;
            startWidth = parseInt(document.defaultView.getComputedStyle(activeImage).width, 10);
            startHeight = parseInt(document.defaultView.getComputedStyle(activeImage).height, 10);
            document.documentElement.addEventListener('mousemove', doDrag, false);
            document.documentElement.addEventListener('mouseup', stopDrag, false);
        });
        function doDrag(e) {
            if (!activeImage) return;
            const newWidth = startWidth + e.clientX - startX;
            activeImage.style.width = newWidth + 'px';
            activeImage.style.height = 'auto'; // Maintain aspect ratio
            setActiveImage(activeImage); // Reposition handle
        }
        function stopDrag() {
            document.documentElement.removeEventListener('mousemove', doDrag, false);
            document.documentElement.removeEventListener('mouseup', stopDrag, false);
            handleTyping(); // Mark as dirty to trigger autosave
        }
      }
      
      // Paste the unchanged functions back here to have the complete script
      function loadImages(){const images=editor.querySelectorAll("img[data-file-id]");if(0===images.length)return;statusDiv.textContent=`Loading ${images.length} image(s)...`,images.forEach(img=>{const fileId=img.dataset.fileId;google.script.run.withSuccessHandler(base64Data=>{base64Data&&!base64Data.startsWith("Error")?img.src=base64Data:img.alt="Error loading image",statusDiv.textContent="All changes saved."}).getImageAsBase64(fileId)})}
      function handleTyping(){isDirty=!0,statusDiv.textContent="Typing...",clearTimeout(saveTimeout),saveTimeout=setTimeout(autosave,2e3)}
      function autosave(){if(!isDirty)return Promise.resolve();var noteContent=editor.innerHTML;return statusDiv.textContent="Saving...",new Promise(resolve=>{google.script.run.withSuccessHandler(()=>{isDirty=!1,statusDiv.textContent="All changes saved.",resolve()}).saveNote(uniqueKey,noteContent)})}
      function handleFileSelect(files){var file=files[0];if(file){var reader=new FileReader;reader.onload=e=>{statusDiv.textContent="Uploading...",google.script.run.withSuccessHandler(fileId=>{if(fileId&&!fileId.startsWith("Error")){var imgHtml=`<img src="" data-file-id="${fileId}" alt="Loading..." style="max-width: 95%;"/>`;document.execCommand("insertHTML",!1,imgHtml),loadImages(),isDirty=!0,autosave()}else statusDiv.textContent=fileId}).uploadImageAndGetId(e.target.result,file.type,file.name)},reader.readAsDataURL(file)}}
      function closeDialog(){document.getElementById("closeBtn").disabled=!0,isDirty?(statusDiv.textContent="Saving final changes...",clearTimeout(saveTimeout),autosave().then(()=>{google.script.host.close()})):google.script.host.close()}
      function formatDoc(command,value){document.execCommand(command,!1,value),editor.focus(),handleTyping()}

    </script>
</body>
</html>
